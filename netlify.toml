# Configuración para desplegar el Frontend (Next.js) en Netlify

[build]
  # Entramos a la carpeta del UI para instalar dependencias y construir
  command = "npm install --prefix cursos/ui && npm run build --prefix cursos/ui"
  
  # Directorio donde Next.js genera la salida (estándar para Next en Netlify)
  publish = "cursos/ui/.next"

# Redirecciones para asegurar que las rutas de Next.js funcionen al recargar
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://tu-api-backend.onrender.com/api" # Reemplazar con la URL real de tu backend cuando lo despliegues
